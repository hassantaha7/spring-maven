name: Spring Boot CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  devsecops:
    name: Build, SonarQube, Nexus & Docker
    runs-on: self-hosted

    env:
      MAVEN_OPTS: "-Xms128m -Xmx256m -XX:MaxMetaspaceSize=128m"

    steps:
      - name: Checkout repository manually
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          git init
          git remote add origin https://github.com/${GITHUB_REPOSITORY}.git
          git -c http.extraheader="AUTHORIZATION: bearer $GH_TOKEN" fetch --depth 1 origin $GITHUB_SHA
          git checkout --force FETCH_HEAD

      - name: Fix Maven wrapper permissions
        run: chmod +x mvnw

      - name: Check Java and Docker
        run: |
          java -version
          docker --version

      - name: Build and test with Maven
        run: ./mvnw clean verify

      - name: SonarQube Analysis
        run: |
          ./mvnw org.sonarsource.scanner.maven:sonar-maven-plugin:4.0.0.4121:sonar \
            -Dsonar.projectKey=springboot-app \
            -Dsonar.projectName=springboot-app \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      - name: Configure Maven settings for Nexus
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>nexus</id>
                <username>${{ secrets.NEXUS_USER }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Publish JAR to Nexus
        if: github.ref == 'refs/heads/main'
        run: ./mvnw deploy -DskipTests

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        if: github.ref == 'refs/heads/main'
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/springboot-app:latest .

      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        run: docker push ${{ secrets.DOCKER_USERNAME }}/springboot-app:latest
